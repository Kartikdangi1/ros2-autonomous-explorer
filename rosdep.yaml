# ============================================================
# rosdep dependency installation
# ============================================================
# Install all ROS2 dependencies:
#   cd ~/ros2-autonomous-explorer
#   rosdep install --from-paths src --ignore-src -r -y
#
# This resolves all <depend>, <build_depend>, <exec_depend>,
# and <test_depend> entries declared in package.xml files.
