[tool.ruff]
line-length = 100
target-version = "py310"
exclude = ["build/", "install/", "log/"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.format]
quote-style = "single"

[tool.pytest.ini_options]
testpaths = ["src/rl_local_planner/tests"]
