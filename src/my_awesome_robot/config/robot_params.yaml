# ============================================================
# ros_gz_bridge configuration
# Maps Gazebo Ignition topics <-> ROS 2 topics
# ============================================================

# -- Velocity command (ROS -> Gazebo) --
- ros_topic_name: /cmd_vel
  gz_topic_name: /model/robot/cmd_vel
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: gz.msgs.Twist
  direction: ROS_TO_GZ

# -- Odometry --
- ros_topic_name: /odom
  gz_topic_name: /model/robot/odom
  ros_type_name: nav_msgs/msg/Odometry
  gz_type_name: gz.msgs.Odometry
  direction: GZ_TO_ROS

# -- TF from Gazebo: DISABLED --
# The mecanum drive plugin's odom→base_link TF is owned by the EKF node
# (ekf.yaml: publish_tf: true).  Bridging /model/robot/tf here creates a
# second publisher for the same frame at a different rate (50 Hz Gazebo vs
# 30 Hz EKF), which floods every TF listener with TF_OLD_DATA warnings.
# robot_state_publisher covers all fixed-joint TFs from the URDF.
#
# - ros_topic_name: /tf
#   gz_topic_name: /model/robot/tf
#   ros_type_name: tf2_msgs/msg/TFMessage
#   gz_type_name: gz.msgs.Pose_V
#   direction: GZ_TO_ROS

# -- Simulation clock --
- ros_topic_name: /clock
  gz_topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS

# -- Joint states (wheel positions for robot_state_publisher) --
# The JointStatePublisher plugin publishes gz.msgs.Model directly
# We need to bridge this as a JointState message
- ros_topic_name: /joint_states
  gz_topic_name: /model/robot/joint_states
  ros_type_name: sensor_msgs/msg/JointState
  gz_type_name: gz.msgs.Model
  direction: GZ_TO_ROS

# ============================================================
# GPU LIDAR (topic: "scan")
# Ignition gpu_lidar publishes LaserScan on <topic> and
# PointCloudPacked on <topic>/points
# ============================================================
- ros_topic_name: /scan
  gz_topic_name: /scan
  ros_type_name: sensor_msgs/msg/LaserScan
  gz_type_name: gz.msgs.LaserScan
  direction: GZ_TO_ROS

- ros_topic_name: /lidar/points
  gz_topic_name: /scan/points
  ros_type_name: sensor_msgs/msg/PointCloud2
  gz_type_name: gz.msgs.PointCloudPacked
  direction: GZ_TO_ROS

# ============================================================
# RADAR (gpu_lidar proxy, topic: "radar")
# Forward-facing 90-degree FOV, 50m range
# ============================================================
- ros_topic_name: /radar/scan
  gz_topic_name: /radar
  ros_type_name: sensor_msgs/msg/LaserScan
  gz_type_name: gz.msgs.LaserScan
  direction: GZ_TO_ROS

- ros_topic_name: /radar/points
  gz_topic_name: /radar/points
  ros_type_name: sensor_msgs/msg/PointCloud2
  gz_type_name: gz.msgs.PointCloudPacked
  direction: GZ_TO_ROS

# ============================================================
# RGBD CAMERA (topic: "rgbd")
# Color image, depth image, camera info
# ============================================================
- ros_topic_name: /rgbd/image
  gz_topic_name: /rgbd/image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS

- ros_topic_name: /rgbd/depth_image
  gz_topic_name: /rgbd/depth_image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS

- ros_topic_name: /rgbd/camera_info
  gz_topic_name: /rgbd/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: gz.msgs.CameraInfo
  direction: GZ_TO_ROS

# ============================================================
# IMU
# ============================================================
- ros_topic_name: /imu
  gz_topic_name: /imu
  ros_type_name: sensor_msgs/msg/Imu
  gz_type_name: gz.msgs.IMU
  direction: GZ_TO_ROS

# ============================================================
# MAGNETOMETER
# ============================================================
- ros_topic_name: /magnetometer
  gz_topic_name: /magnetometer
  ros_type_name: sensor_msgs/msg/MagneticField
  gz_type_name: gz.msgs.Magnetometer
  direction: GZ_TO_ROS
