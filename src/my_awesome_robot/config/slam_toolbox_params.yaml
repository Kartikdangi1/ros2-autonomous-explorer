# SLAM Toolbox Parameters — my_awesome_robot
# Replaces: custom scan-to-map matching (ScanMapMatcher) + static map→odom TF
# Publishes: /map (OccupancyGrid) + map→odom TF (dynamic, loop-closure aware)
#
# TF ownership after this node is active:
#   map → odom  : THIS NODE (dynamic, loop-closure corrected)
#   odom → base_link : robot_localization EKF (ekf.yaml)
#   base_link → * : robot_state_publisher (URDF)

slam_toolbox:
  ros__parameters:
    use_sim_time: true

    # Solver backend
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Frame IDs — must match nav2_params.yaml and ekf.yaml
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    # Use raw LiDAR scan (BEST_EFFORT QoS from Gazebo bridge) for scan-to-map
    # matching.  sensor_fusion publishes /fused_scan with RELIABLE QoS; Fast-DDS
    # on this system does not reliably deliver RELIABLE→BEST_EFFORT connections to
    # slam_toolbox (which subscribes with sensorDataQoS = BEST_EFFORT).  Using
    # /scan directly gives a BEST_EFFORT→BEST_EFFORT match that always connects.
    # Nav2 obstacle_layer and NBV continue using /fused_scan (multi-sensor fused).
    scan_topic: /scan
    use_map_saver: true

    # Mode: mapping builds the map as the robot explores
    # Switch to "localization" + provide a map_file_name for a known environment
    mode: mapping

    # Map update rate — match map_publish_rate from nbv_splam_params.yaml
    map_update_interval: 0.3
    resolution: 0.05

    # Maximum range to include in the map (match max_range)
    min_laser_range: 0.1         # match lidar min in robot.urdf.xacro (avoids SLAM warning)
    max_laser_range: 18.0        # match lidar max in robot.urdf.xacro
    # Set to 0.0 so SLAM processes scans even when the robot is stationary.
    # Without this, a stuck robot never moves 2cm and SLAM starves — the map
    # stays empty, the planner routes through walls, the robot stays stuck.
    # minimum_time_interval caps scan intake to ≤ 1/s to prevent graph bloat.
    minimum_travel_distance: 0.0
    minimum_travel_heading: 0.0
    # 10 scans/second — fine-grained ego-motion tracking.
    minimum_time_interval: 0.1
    scan_buffer_size: 5             # 5 scans = 0.25s warmup at 20Hz (10 was too slow)
    scan_buffer_maximum_scan_distance: 15.0  # was 10.0
    link_match_minimum_response_fine: 0.35   # was 0.45 — more permissive for sparse/early scans
    link_scan_maximum_distance: 1.5

    # Loop closure — replaces the static map→odom offset with a full SLAM correction
    do_loop_closing: true
    loop_search_maximum_distance: 4.0
    loop_match_minimum_response_fine: 0.5
    loop_match_minimum_response_coarse: 0.35
    loop_match_maximum_variance_coarse: 3.0
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.1
    loop_search_space_smear_deviation: 0.05

    # Correlation search parameters
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1

    # Fine scan matching
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true

    # Visualization
    map_start_at_dock: false         # was true — false avoids TF dependency at cold start
    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02   # 50 Hz TF updates
    transform_timeout: 1.0           # was 0.5 — more time for EKF TF on slow Gazebo startup
