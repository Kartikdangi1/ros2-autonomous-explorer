perception_node:
  ros__parameters:
    # YOLOv8 Model Configuration
    model_path: "yolov8n.pt"  # Options: yolov8n.pt, yolov8s.pt, yolov8m.pt
    
    # Detection Thresholds
    confidence_threshold: 0.5  # Min confidence (0.0-1.0)
    iou_threshold: 0.45        # IoU for NMS (0.0-1.0)
    
    # Target classes (COCO dataset)
    # 0: person, 16: cat, 17: dog
    target_classes: [0, 16, 17]  # Person, Cat, Dog
    
    # Topics
    camera_topic: "/camera/image_raw"
    detections_topic: "/detections"
    
    # Output Settings
    publish_annotated_image: true
    annotated_image_topic: "/camera/annotated"
    debug_mode: true
    debug_publish_rate: 5  # Hz

dynamic_obstacle_spawner:
  ros__parameters:
    # Number of obstacles to spawn
    num_obstacles: 3
    
    # Types of obstacles (person, dog, cat)
    obstacle_types: ['person', 'dog', 'cat']
    
    # Spawn area (random initial positions within radius)
    spawn_area_radius: 3.0
    
    # Circular trajectory radius around spawn point
    trajectory_radius: 2.0
    
    # Speed of circular motion (rad/s)
    trajectory_speed: 0.5
