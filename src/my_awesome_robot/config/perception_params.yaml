/perception_node:
  ros__parameters:
    # YOLOv8 Model Configuration
    model_path: "yolov8n.pt"  # Options: yolov8n.pt, yolov8s.pt, yolov8m.pt
    
    # Detection Thresholds
    confidence_threshold: 0.5  # Min confidence (0.0-1.0)
    iou_threshold: 0.45        # IoU for NMS (0.0-1.0)
    
    # Target classes (COCO dataset)
    # 0: person, 2: car, 3: motorcycle, 5: bus, 7: truck
    # 15: bird, 16: cat, 17: dog, 39: bottle, 41: cup
    target_classes: [0, 2, 3, 5, 7]
    
    # Topics
    camera_topic: "/camera/image_raw"
    
    # Output Settings
    publish_annotated_image: true
    debug_mode: false
