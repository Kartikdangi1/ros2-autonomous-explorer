# ============================================================
# ros_gz_bridge configuration for RL training
# Extends the base robot_params.yaml with training-specific topics
# ============================================================

# -- Velocity command (ROS -> Gazebo) --
- ros_topic_name: /cmd_vel
  gz_topic_name: /model/robot/cmd_vel
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: gz.msgs.Twist
  direction: ROS_TO_GZ

# -- Odometry --
- ros_topic_name: /odom
  gz_topic_name: /model/robot/odom
  ros_type_name: nav_msgs/msg/Odometry
  gz_type_name: gz.msgs.Odometry
  direction: GZ_TO_ROS

# -- Simulation clock --
- ros_topic_name: /clock
  gz_topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS

# -- Joint states --
- ros_topic_name: /joint_states
  gz_topic_name: /model/robot/joint_states
  ros_type_name: sensor_msgs/msg/JointState
  gz_type_name: gz.msgs.Model
  direction: GZ_TO_ROS

# -- GPU LIDAR --
- ros_topic_name: /scan
  gz_topic_name: /scan
  ros_type_name: sensor_msgs/msg/LaserScan
  gz_type_name: gz.msgs.LaserScan
  direction: GZ_TO_ROS

# -- RADAR --
- ros_topic_name: /radar/scan
  gz_topic_name: /radar
  ros_type_name: sensor_msgs/msg/LaserScan
  gz_type_name: gz.msgs.LaserScan
  direction: GZ_TO_ROS

# -- RGBD CAMERA --
- ros_topic_name: /rgbd/image
  gz_topic_name: /rgbd/image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS

- ros_topic_name: /rgbd/depth_image
  gz_topic_name: /rgbd/depth_image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS

- ros_topic_name: /rgbd/camera_info
  gz_topic_name: /rgbd/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: gz.msgs.CameraInfo
  direction: GZ_TO_ROS

# -- IMU --
- ros_topic_name: /imu
  gz_topic_name: /imu
  ros_type_name: sensor_msgs/msg/Imu
  gz_type_name: gz.msgs.IMU
  direction: GZ_TO_ROS

# -- MAGNETOMETER --
- ros_topic_name: /magnetometer
  gz_topic_name: /magnetometer
  ros_type_name: sensor_msgs/msg/MagneticField
  gz_type_name: gz.msgs.Magnetometer
  direction: GZ_TO_ROS

# Teleport is done via `ign service` CLI — no extra bridge needed.
