name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff==0.11.2

      - name: Run ruff check
        run: ruff check src/

  test:
    name: Unit tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependencies
        run: |
          pip install \
            numpy==2.2.6 \
            scipy==1.15.3 \
            opencv-python-headless==4.12.0.88 \
            gymnasium==1.2.3 \
            stable-baselines3==2.7.1 \
            torch==2.9.1 --index-url https://download.pytorch.org/whl/cpu \
            pydantic==2.12.5 \
            pytest

      - name: Run unit tests
        run: |
          # Add src to PYTHONPATH so rl_local_planner is importable without ROS2
          export PYTHONPATH=$PYTHONPATH:src/rl_local_planner
          python3 -m pytest src/rl_local_planner/tests/ -v --tb=short
